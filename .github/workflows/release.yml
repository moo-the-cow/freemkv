name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (optional - will use Cargo.toml if not specified)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VER="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          
          # For manual dispatch, skip verification or use provided version
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              if [ "${{ inputs.version }}" != "$CARGO_VER" ]; then
                echo "::warning::Manual version ${{ inputs.version }} differs from Cargo.toml version $CARGO_VER"
              else
                echo "Version match: $CARGO_VER"
              fi
            else
              echo "Manual run without version check, using Cargo.toml version: $CARGO_VER"
            fi
            # Set output for later use
            echo "version=$CARGO_VER" >> $GITHUB_OUTPUT
          else
            # For tag pushes, enforce strict matching
            if [ "$CARGO_VER" != "${{ github.ref_name }}" ]; then
              echo "::error::Cargo.toml says $CARGO_VER but tag is ${{ github.ref_name }}"
              exit 1
            fi
            echo "Version match: $CARGO_VER"
            echo "version=$CARGO_VER" >> $GITHUB_OUTPUT
          fi
        id: verify

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
            macos_deployment_target: "10.12"
          - target: aarch64-apple-darwin
            os: macos-latest
            macos_deployment_target: "11.0"
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl -sL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv cross /usr/local/bin/

      - name: Setup macOS environment
        if: runner.os == 'macOS'
        run: |
          # Set macOS deployment target
          echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}" >> $GITHUB_ENV
          # Install required tools
          brew install coreutils

      - name: Test (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo test --target ${{ matrix.target }}

      - name: Build (Linux musl)
        if: contains(matrix.target, 'musl') && matrix.target != 'aarch64-unknown-linux-musl'
        env:
          CFLAGS: "-U_FORTIFY_SOURCE"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux aarch64 cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: |
          # Force the correct architecture for all C/C++ compilations
          ARCH="${{ matrix.target == 'x86_64-apple-darwin' && 'x86_64' || 'arm64' }}"
          export CC="clang -arch ${ARCH}"
          export CXX="clang++ -arch ${ARCH}"
          
          # Clean any cached builds to avoid arch conflicts
          cargo clean
          
          # Build with explicit target (no RUSTFLAGS to avoid CPU issues when cross-compiling)
          cargo build --release --target ${{ matrix.target }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          VERSION="${{ needs.verify.outputs.version || github.ref_name }}"
          # Handle binary name (freemkv on Unix, no extension)
          if [ -f "freemkv" ]; then
            tar czf "../../../freemkv-${VERSION}-${{ matrix.target }}.tar.gz" freemkv
            tar czf "../../../freemkv-${{ matrix.target }}.tar.gz" freemkv
          else
            echo "Binary not found in $(pwd)"
            ls -la
            exit 1
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.verify.outputs.version || github.ref_name }}"
          if (Test-Path "target/${{ matrix.target }}/release/freemkv.exe") {
            Compress-Archive -Path "target/${{ matrix.target }}/release/freemkv.exe" -DestinationPath "freemkv-${VERSION}-${{ matrix.target }}.zip"
            Compress-Archive -Path "target/${{ matrix.target }}/release/freemkv.exe" -DestinationPath "freemkv-${{ matrix.target }}.zip"
          } else {
            Write-Error "Binary not found"
            exit 1
          }

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          tag_name: ${{ needs.verify.outputs.version || github.ref_name }}

  update-homepage:
    needs: [verify, build]
    if: always() && needs.build.result != 'cancelled' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Update org README with new version
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_DISPATCH_TOKEN }}
          repository: freemkv/.github
          event-type: new-release
          client-payload: '{"version": "${{ needs.verify.outputs.version || github.ref_name }}"}'
