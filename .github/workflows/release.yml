name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VER="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$CARGO_VER" != "${{ github.ref_name }}" ]; then
            echo "::error::Cargo.toml says $CARGO_VER but tag is ${{ github.ref_name }}"
            exit 1
          fi
          echo "Version match: $CARGO_VER"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: freemkv-x86_64-linux
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: freemkv-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: freemkv-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: freemkv-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: freemkv-x86_64-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl -sL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv cross /usr/local/bin/

      - name: Test
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo test --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: |
          # Ubuntu's gcc defaults to -D_FORTIFY_SOURCE=2 which makes
          # mimalloc-sys (transitive C dep) emit calls to glibc-only
          # __memcpy_chk / __memset_chk that aren't in musl. Disable
          # fortify for the C portion of the build.
          export CFLAGS="-U_FORTIFY_SOURCE"
          cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          # Versioned + unversioned tarballs (existing convention).
          tar czf "../../../freemkv-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" freemkv
          tar czf "../../../freemkv-${{ matrix.target }}.tar.gz" freemkv
          cd ../../..
          # Plain, runnable binary asset (download → chmod +x → run).
          cp "target/${{ matrix.target }}/release/freemkv" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"
          shasum -a 256 \
            "freemkv-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" \
            "freemkv-${{ matrix.target }}.tar.gz" \
            "${{ matrix.asset }}" \
            > "${{ matrix.asset }}.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/freemkv.exe" -DestinationPath "freemkv-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/freemkv.exe" -DestinationPath "freemkv-${{ matrix.target }}.zip"
          # Plain, runnable binary asset.
          Copy-Item "target/${{ matrix.target }}/release/freemkv.exe" "${{ matrix.asset }}"
          $h = Get-FileHash -Algorithm SHA256 "${{ matrix.asset }}"
          "$($h.Hash.ToLower())  ${{ matrix.asset }}" | Out-File -Encoding ascii "${{ matrix.asset }}.sha256"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  update-homepage:
    needs: build
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Update org README with new version
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_DISPATCH_TOKEN }}
          repository: freemkv/.github
          event-type: new-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
