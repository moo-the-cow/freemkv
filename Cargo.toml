[package]
name = "freemkv"
version = "0.13.43"
edition = "2024"
rust-version = "1.86"
license = "AGPL-3.0-only"
description = "Open source 4K UHD / Blu-ray / DVD backup tool"
repository = "https://github.com/freemkv/freemkv"

[[bin]]
name = "freemkv"
path = "src/main.rs"

[dependencies]
libfreemkv = "0.13.43"
isolang = "2"
ureq = { version = "2", features = ["json"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
serde_json = "1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
