[package]
name = "freemkv"
version = "0.19.0"
edition = "2024"
rust-version = "0.19.0"
license = "AGPL-3.0-only"
description = "Open source 4K UHD / Blu-ray / DVD backup tool"
repository = "https://github.com/freemkv/freemkv"

[[bin]]
name = "freemkv"
path = "src/main.rs"

[dependencies]
libfreemkv = "0.17"
isolang = "2"
tracing-subscriber = "0.3"
ureq = { version = "0.19.0", features = ["json"] }
zip = { version = "0.19.0", default-features = false, features = ["deflate"] }
serde_json = "1"
libc = "0.2"
