[package]
name = "freemkv"
version = "0.27.4"
edition = "2024"
rust-version = "1.86"
license = "AGPL-3.0-only"
description = "Open source 4K UHD / Blu-ray / DVD backup tool"
repository = "https://github.com/freemkv/freemkv"

[[bin]]
name = "freemkv"
path = "src/main.rs"

[dependencies]
libfreemkv = "0.27"
freemkv-keysources = "0.27"
isolang = "2"
tracing-subscriber = "0.3"
ureq = { version = "2", features = ["json"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
serde_json = "1"
libc = "0.2"
# Global allocator. The mux consumer thread frees PesPacket buffers
# whose backing Vec<u8> was allocated by the demux thread — musl's
# mallocng cross-thread free path was visibly slowing the null://
# benchmark relative to autorip (which already uses mimalloc).
# Matching allocators across binaries makes perf numbers comparable.
mimalloc = "0.1"

# ─── DEV-ONLY LOCAL PATCH — DO NOT COMMIT/PUSH ───────────────────────────────
# CI builds deps from crates.io. libfreemkv 0.27.5 and freemkv-keysources are
# not published yet; point them at local working copies for 0.27.5 development.
# Before release: publish in order (libfreemkv → freemkv-keysources → freemkv)
# and DELETE this section.
[patch.crates-io]
libfreemkv = { path = "../libfreemkv" }
freemkv-keysources = { path = "../freemkv-keysources" }
